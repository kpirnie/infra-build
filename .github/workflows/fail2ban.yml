name: Build · fail2ban

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
    paths:
      - "fail2ban/**"
      - ".github/workflows/fail2ban.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kpirnie/fail2ban

jobs:
  build:
    name: Build & push fail2ban
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: fail2ban
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:latest-${{ steps.meta.outputs.date }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=fail2ban
          cache-to: type=gha,scope=fail2ban,mode=max
