name: Build · PHP-FPM

on:
  schedule:
    - cron: "30 0 * * *"
  push:
    branches: [main]
    paths:
      - "php/**"
      - ".github/workflows/php.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kpirnie/php

jobs:
  build:
    name: Build & push PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # A PECL incompatibility on one version shouldn't cancel the others
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP ${{ matrix.php }}
        uses: docker/build-push-action@v7
        with:
          context: php
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ matrix.php }}-latest
            ${{ env.IMAGE }}:${{ matrix.php }}-latest-${{ steps.meta.outputs.date }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VCS_REF=${{ github.sha }}
          # Each PHP version gets its own cache scope so matrix jobs don't stomp each other
          cache-from: type=gha,scope=php-${{ matrix.php }}
          cache-to: type=gha,scope=php-${{ matrix.php }},mode=max
