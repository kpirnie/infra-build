name: Build · SFTP

on:
  schedule:
    - cron: "20 0 * * *"
  push:
    branches: [main]
    paths:
      - "sftp/**"
      - ".github/workflows/sftp.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kpirnie/sftp

jobs:
  build:
    name: Build & push sftp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: sftp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:latest-${{ steps.meta.outputs.date }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=sftp
          cache-to: type=gha,scope=sftp,mode=max
