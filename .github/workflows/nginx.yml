name: Build · nginx

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/kpirnie/nginx

jobs:
  build:
    name: Build & push nginx
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Resolve latest module versions
        id: versions
        run: |
          gh_latest()     { curl -fsSL "https://api.github.com/repos/$1/releases/latest" | grep '"tag_name"' | cut -d'"' -f4; }
          gh_latest_tag() { curl -fsSL "https://api.github.com/repos/$1/tags" | grep '"name"' | head -1 | cut -d'"' -f4; }
          strip_v()       { echo "${1#v}"; }

          nginx=$(curl -fsSL https://nginx.org/en/download.html | grep -oP 'nginx-\K1\.[0-9]*[13579]\.[0-9]+(?=\.tar\.gz)' | head -1)
          openssl_tag=$(gh_latest openssl/openssl)
          luajit=$(curl -fsSL "https://api.github.com/repos/openresty/luajit2/tags" | grep '"name"' | grep -oP '"v2\.1-[0-9]+"' | head -1 | tr -d '"')
          ndk=$(strip_v "$(gh_latest_tag vision5/ngx_devel_kit)")
          lua=$(strip_v "$(gh_latest_tag openresty/lua-nginx-module)")
          headers=$(strip_v "$(gh_latest_tag openresty/headers-more-nginx-module)")
          geoip2=$(gh_latest leev/ngx_http_geoip2_module)
          njs=$(gh_latest nginx/njs)

          echo "nginx=${nginx}"             >> $GITHUB_OUTPUT
          echo "openssl=${openssl_tag#openssl-}" >> $GITHUB_OUTPUT
          echo "luajit=${luajit}"           >> $GITHUB_OUTPUT
          echo "ndk=${ndk}"                 >> $GITHUB_OUTPUT
          echo "lua=${lua}"                 >> $GITHUB_OUTPUT
          echo "headers=${headers}"         >> $GITHUB_OUTPUT
          echo "geoip2=${geoip2}"           >> $GITHUB_OUTPUT
          echo "njs=${njs}"                 >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nginx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:latest-${{ steps.meta.outputs.date }}
          build-args: |
            NGINX_VERSION=${{ steps.versions.outputs.nginx }}
            OPENSSL_VERSION=${{ steps.versions.outputs.openssl }}
            LUAJIT_BRANCH=${{ steps.versions.outputs.luajit }}
            NDK_VERSION=${{ steps.versions.outputs.ndk }}
            LUA_NGINX_VERSION=${{ steps.versions.outputs.lua }}
            HEADERS_MORE_VERSION=${{ steps.versions.outputs.headers }}
            GEOIP2_VERSION=${{ steps.versions.outputs.geoip2 }}
            NJS_VERSION=${{ steps.versions.outputs.njs }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VCS_REF=${{ github.sha }}
          # Scoped cache keeps nginx layers isolated from php cache
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,scope=nginx,mode=max
