# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf – bare minimum global config
# All site-specific config belongs in /etc/nginx/conf.d/*.conf
# Stream config belongs in      /etc/nginx/stream.d/*.conf
# ─────────────────────────────────────────────────────────────────────────────

# Master runs as root to bind :80/:443; workers drop to this unprivileged user
user              nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
pid               /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    charset          utf-8;
    server_tokens    off;   # Never expose nginx version in headers or error pages

    sendfile         on;
    tcp_nopush       on;
    tcp_nodelay      on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── TLS global defaults ── override per server block as required ──────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;            # Forward secrecy

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Site configs ──────────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}

# ── TCP/UDP stream proxy ──────────────────────────────────────────────────────
stream {
    include /etc/nginx/stream.d/*.conf;
}