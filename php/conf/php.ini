; ─────────────────────────────────────────────────────────────────────────────
; php.ini – minimal hardened base
; Override specific values via volume-mounted snippets in:
;   /usr/local/etc/php/conf.d/*.ini
; ─────────────────────────────────────────────────────────────────────────────

[PHP]
; ── Security ──────────────────────────────────────────────────────────────────
expose_php             = Off
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /proc/self/fd/2
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Prevent remote file inclusion vectors
allow_url_fopen        = Off
allow_url_include      = Off

; Disable functions with no legitimate web-app use
; Extend this list via a volume-mounted conf.d snippet for stricter environments
disable_functions = 

; ── Uploads ───────────────────────────────────────────────────────────────────
file_uploads           = On
upload_max_filesize    = 16M
post_max_size          = 16M

; ── Resource limits ───────────────────────────────────────────────────────────
memory_limit           = 128M
max_execution_time     = 30
max_input_time         = 30
max_input_vars         = 1000

; ── Realpath cache (reduce stat() calls on deep directory trees) ───────────────
realpath_cache_size    = 4096k
realpath_cache_ttl     = 600

; ── Date ──────────────────────────────────────────────────────────────────────
[Date]
date.timezone          = UTC

; ── Session hardening ─────────────────────────────────────────────────────────
[Session]
session.cookie_secure    = 1
session.cookie_httponly  = 1
session.cookie_samesite  = Strict
session.use_strict_mode  = 1
session.gc_maxlifetime   = 1440

; ── OPcache ───────────────────────────────────────────────────────────────────
[opcache]
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 16
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 2500
opcache.validate_timestamps     = 1
opcache.revalidate_freq         = 60
; Must be on for annotations / attributes used by Laravel + Doctrine
opcache.save_comments           = 1