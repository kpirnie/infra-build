; ─────────────────────────────────────────────────────────────────────────────
; www.conf – minimal FPM pool config
; Override via volume-mounted files in /usr/local/etc/php-fpm.d/
; Note: zz-docker.conf (from the base image) runs last and enforces
;       daemonize = no and listen = 9000 – those values are intentionally
;       duplicated here for clarity.
; ─────────────────────────────────────────────────────────────────────────────

[www]
user  = www-data
group = www-data

; TCP listener – nginx connects via fastcgi_pass <service>:9000
listen = 9000

; ── Process manager ───────────────────────────────────────────────────────────
; Conservative generic defaults – tune via a volume-mounted override
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Recycle workers periodically to prevent memory creep
pm.max_requests      = 500

; ── Environment ───────────────────────────────────────────────────────────────
; Pass container environment variables through to PHP (12-factor compatible).
; Set to "yes" and use fastcgi_param directives in nginx for stricter isolation.
clear_env = no

; ── Logging (Docker-friendly: write to stderr) ────────────────────────────────
php_admin_value[error_log]  = /proc/self/fd/2
php_admin_flag[log_errors]  = on
access.log                  = /proc/self/fd/2